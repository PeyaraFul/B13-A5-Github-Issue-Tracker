<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css/index.css" />

    <title>GitHub Issue Tracker</title>
  </head>
  <body class="">
    <form action="" class="mx-auto">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mx-auto"
      >
        <div class="mx-auto my-4">
          <img
            class="mx-auto"
            src="./assets/github-logo.png"
            alt="github logo"
          />
          <h1 class="font-semibold text-[1.5rem]">GitHub Issue Tracker</h1>
          <p class="text-neutral-500 text-center text-sm">
            Sign to manage your issue
          </p>
        </div>
        
        <label for="username" class="label text-black">Username</label>
        <input
          id="username"
          type="text"
          class="input"
          placeholder="Enter Username"
        />
        <span class="text-green-600">Default: admin </span>

        <label for="password" class="label text-black">Password</label>
        <input
          id="password"
          type="password"
          class="input"
          placeholder="Enter Password"
        />
        <span class="text-green-600">Default: admin123 </span>
        <button
          type="button"
          onclick="goHomePage()"
          class="btn btn-neutral bg-[#4A00FF] mt-4"
        >
          Login
        </button>
        <div class="divider">OR</div>
        <div class="text-center">
          <span class="text-neutral-500">Demo credential</span> <br />
          <p class="m-3 bg-neutral-200 p-2 rounded-md">
            <span class="font-bold">Username:</span> admin <br />
            <span class="font-bold">Password:</span> admin123
          </p>
        </div>
      </fieldset>
    </form>

    <script src="./js/index.js"></script>
    <!-- peyaraful -->
  </body>
</html>
