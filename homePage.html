<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./style.css/homePage.css">
    <title>GitHub Issue Tracker | Homepage</title>
</head>
<body id="home" class="">



    <nav class="navbar stick z-10 top-0 bg-base-100 flex justify-between shadow-sm">
        <div class="flex gap-2">
            <img class="mx-auto w-8" src="./assets/github-logo.png" alt="github logo">
                <h2 class="font-semibold mt-1 align-baseline text-[1rem]"> GitHub Issue Tracker </h2>
        </div>
        <div class="flex gap-2">
            <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
            <div class="dropdown dropdown-end">
            <button class="btn btn-primary">Primary</button>
      
            </div>
        </div>
    </nav>



<main class="mx-10 bg-yellow-200">
    <!-- name of each tab group should be unique -->
        <div class="tabs tabs-box  bg-blue-300 relative ">
            <input type="radio" name="my_tabs_6" class="tab" aria-label="All"  checked="checked"/>
            <div class="tab-content bg-base-100 bg-red-300 border-base-300 p-6">
                <article id="all-issue" class=" overflow-scroll flex bg-green-300 flex-wrap gap-4 mt-20 p-4 rounded-lg h-screen">
                </article>
            </div>

            <input type="radio" name="my_tabs_6" class="tab" aria-label="Open" />
            <div class="tab-content bg-base-100 border-base-300 p-6">Open</div>

            <input type="radio" name="my_tabs_6" class="tab tabs-lift" aria-label="Closed" />
            <div class="tab-content bg-base-100 border-base-300 p-6">
                
                
                
                
                </div>


 <header class="flex bg-base bg-pink-300 rounded-lg ml-[-4px] w-full justify-between p-4 absolute top-14 ">
    <div class="flex gap-2">
        <img src="./assets/Aperture.png" alt="">
        <div class=""> 
            <h3 class=" font-bold text-[1.1rem]"> <span id="number-of-all-issue"> 0 </span> Issue</h3>
            <h4 class="text-neutral-500 w-[100%]">Track and manage your issue</h4>
        </div>
        

    </div>

    <div class="flex ">
            <div class="w-2.5 h-2.5 mt-1.5 mr-1 bg-green-500 rounded-full"></div> Open
            <div class="w-2.5 h-2.5 mt-1.5 mr-1 ml-3 bg-purple-500 rounded-full"></div> Closed
            
    </div>
 </header>

        </div>



<!-- dashboard -->
 
             


</main>


<script src="./js/homePage.js"></script>

</body>
</html>
