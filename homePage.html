<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./style.css/homePage.css">
    <title>GitHub Issue Tracker | Homepage</title>
</head>
<body id="home" class="">



    <nav class="navbar stick z-10 top-0 bg-base-100 flex justify-between shadow-sm">
        <div class="flex gap-2">
            <img class="mx-auto w-8" src="./assets/github-logo.png" alt="github logo">
                <h2 class="font-semibold mt-1 align-baseline text-[1rem]"> GitHub Issue Tracker </h2>
        </div>
        <!-- onclick="xDataPass('search-value')"-->
        <div class="flex gap-2">
            <input id="search-value"  type="text" placeholder="Search Issue" class="input input-bordered w-24 md:w-auto" />
            <div class="dropdown dropdown-end">
            <button id="search-btn" class="btn btn-primary"> + New Issue </button>
      
            </div>
        </div>
    </nav>



<main class="mx-10 bg-yellow-200">

    <!-- tab tab  -->
    <!-- name of each tab group should be unique -->
        <div class="tabs tabs-box  bg-blue-300 relative ">
            <input type="radio" name="my_tabs_6" class="tab" aria-label="All"  checked="checked" onclick="countIssue('all-tab')"/>
            <div class="tab-content bg-base-100 bg-red-300 border-base-300 p-6">
              
                <article id="all-issue"  class=" overflow-scroll flex bg-green-300 flex-wrap gap-4 mt-20 p-4 rounded-lg">
                </article>
                <article class="spinner flex justify-center items-center h-screen">
                    <span class="loading loading-spinner loading-xl text-error w-9 h-9"></span>
                </article>
                
                
            </div>

            <input type="radio" id="open-tab" name="my_tabs_6" class="tab open-tab"  aria-label="Open" onclick="countIssue('open-tab')" />
            <div class="tab-content bg-base-100 border-base-300 p-6">

                <article id="open-issue" class=" overflow-scroll flex bg-green-300 flex-wrap gap-4 mt-20 p-4 rounded-lg h-screen">
                </article>
                 <article class="spinner flex justify-center items-center h-screen">
                    <span class="loading loading-spinner loading-xl text-neutral w-9 h-9"></span>
                </article>
            </div>

            <input type="radio" id="closed-tab" name="my_tabs_6" class="tab tabs-lift closed-tab" aria-label="Closed" onclick="countIssue('closed-tab')" />
            <div class="tab-content bg-base-100 border-base-300 p-6">
                                
                <article id="closed-issue" class=" overflow-scroll flex bg-green-300 flex-wrap gap-4 mt-20 p-4 rounded-lg">
                </article>
                <article class="spinner flex justify-center items-center h-screen">
                    <span class="loading loading-spinner loading-xl text-accent w-9 h-9"></span>
                </article>

                </div>


 <header class="flex bg-base bg-pink-300 rounded-lg ml-[-4px] w-full justify-between p-4 absolute top-14 ">
    <div class="flex gap-2">
        <img src="./assets/Aperture.png" alt="">
        <div class=""> 
            <h3 class=" font-bold text-[1.1rem]"> <span id="number-of-all-issue"> 0 </span> Issue</h3>
            <h4 class="text-neutral-500 w-[250px]">Track and manage your issue</h4>
        </div>
        

    </div>

    <div class="flex">
            <div class="w-2.5 h-2.5 mt-1.5 mr-1 bg-green-500 rounded-full"></div> Open
            <div class="w-2.5 h-2.5 mt-1.5 mr-1 ml-3 bg-purple-500 rounded-full"></div> Closed
            
    </div>
 </header>

        </div>



<!-- dashboard -->
 
             


</main>


<!-- dialog modal box  -->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <div>
        <h2 id="modal-title" class="text-xl font-bold"> <!-- Title --> </h2>
        
        <div class="my-4 flex gap-4">

            <div id="modal-status" class="badge badge-success text-xl p-3 font-semibold"> <!-- status --> </div> • <span id="modal-author" > <!-- Author  --> </span> • <span>07-03-26</span> <br>
        </div>
        
         <div id="modal-labels0" class="badge badge-secondary font-semibold text-orange-500 bg-[#FECACA] "> <!-- labels0 --> </div>
        <div id="modal-labels1" class="badge badge-warning font-semibold ml-4 text-yellow-700 bg-[#FDE68A]">  <!-- labels1 --> </div>
        <p id="modal-description" class="my-4 text-neutral-500"> <!-- Description --> </p>
    </div>

    <div class="flex justify-between w-full p-10 rounded-lg bg-slate-100">
        <div><span>Assignee:</span><br>
        <span id="modal-assignee" class="font-bold"> <!-- Assignee-->  </span></div>

        <div><span>Priority:</span><br> 
        <div id="modal-priority" class="badge badge-warning text-[#F59E0B] font-semibold bg-[#FFF6D1] "> <!-- Priority --> </div></div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

<script type="module" src="./js/homePage.js"></script>

</body>
</html>
