        <div class="tab-content bg-base-100 border-base-300 p-6">Tab content 1</div>

        <input type="radio" name="my_tabs_6" class="tab tabs-lift" aria-label="Closed" />

<!-- dashboard -->
 <header class="flex bg-base justify-between p-4 ">

 </header>
